<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4ede0" />
  <title>Lost in the Stacks · Learn Something New</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .lost {
      max-width: 620px;
      margin: 0 auto;
      text-align: center;
      padding: clamp(3rem, 9vw, 7rem) var(--gutter) 3rem;
      position: relative;
      z-index: 2;
    }
    .lost-num {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(5rem, 14vw, 9rem);
      line-height: 1;
      color: var(--gold);
      margin: 0;
      letter-spacing: -0.02em;
      opacity: 0.85;
    }
    .lost h1 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.018em;
      line-height: 1.06;
      color: var(--ink);
      margin: 1.2rem 0 1rem;
      text-wrap: balance;
    }
    .lost p {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.2rem;
      line-height: 1.55;
      color: var(--ink-mute);
      margin: 0 auto 2rem;
      max-width: 38ch;
      text-wrap: balance;
    }
    .lost a.home-link {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      background: var(--ink);
      color: var(--paper);
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 0.84rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 1.05rem 2.4rem;
      border-radius: 999px;
      box-shadow:
        0 1px 2px rgba(26, 20, 16, 0.15),
        0 14px 28px -14px rgba(26, 20, 16, 0.45);
      transition: background 240ms;
    }
    .lost a.home-link:hover { background: var(--accent-deep); }
    .lost .arr {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0;
    }
    .lost-orn {
      width: 240px;
      margin: 1.4rem auto 0;
      color: var(--gold);
      opacity: 0.7;
    }
    .lost-orn img { width: 100%; display: block; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <canvas id="ambient" aria-hidden="true"></canvas>
  <div id="page-transition" aria-hidden="true"></div>

  <main id="main" role="main" class="lost">
    <div class="lost-num" aria-hidden="true">404</div>
    <h1>A page lost in <em>the stacks</em>.</h1>
    <p>The shelf you searched for is empty — or perhaps was never set in type. Wander back to the reading room.</p>
    <a class="home-link" href="./">
      <span>Return Home</span>
      <span class="arr" aria-hidden="true">→</span>
    </a>
    <div class="lost-orn" aria-hidden="true">
      <img src="assets/ornament.svg" alt="" data-inline-svg />
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <span class="site-mark">Learn Something New</span>
    <span class="site-dot" aria-hidden="true">·</span>
    <span class="site-sub">a quiet field guide</span>
  </footer>

  <script src="js/visuals.js"></script>
</body>
</html>
