<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- heart with two chambers, center -->
  <g class="draw-paths" transform="translate(200 165)" opacity="0.9">
    <!-- heart outline -->
    <path d="M0 50 C-44 24 -64 -2 -64 -22 C-64 -42 -48 -54 -32 -54 C-16 -54 -4 -44 0 -30 C4 -44 16 -54 32 -54 C48 -54 64 -42 64 -22 C64 -2 44 24 0 50 Z" stroke-dasharray="380 380" stroke-dashoffset="380" stroke-width="1.4"/>
    <!-- septum between chambers -->
    <path d="M0 -30 L0 44" stroke-dasharray="80 80" stroke-dashoffset="80" opacity="0.7"/>
    <!-- left chamber valve hint -->
    <path d="M-22 -22 Q-12 -16 -4 -22" stroke-dasharray="36 36" stroke-dashoffset="36" opacity="0.7"/>
    <!-- right chamber valve hint -->
    <path d="M4 -22 Q12 -16 22 -22" stroke-dasharray="36 36" stroke-dashoffset="36" opacity="0.7"/>
    <!-- aortic arch -->
    <path d="M-8 -54 C-8 -74 18 -82 24 -64 C28 -54 22 -50 18 -54" stroke-dasharray="80 80" stroke-dashoffset="80"/>
  </g>
  <!-- lung branches: trachea + bronchi (rising from heart top) -->
  <g class="draw-paths" transform="translate(200 80)" opacity="0.85">
    <!-- trachea -->
    <path d="M0 0 L0 24" stroke-dasharray="30 30" stroke-dashoffset="30" stroke-width="1.4"/>
    <!-- tracheal rings -->
    <path d="M-5 6 L5 6 M-5 12 L5 12 M-5 18 L5 18" stroke-dasharray="12 12" stroke-dashoffset="12" opacity="0.6"/>
    <!-- left bronchial tree -->
    <path d="M0 24 L-24 44 L-44 60 M-24 44 L-32 58 M-44 60 L-56 72 M-44 60 L-42 76" stroke-dasharray="180 180" stroke-dashoffset="180"/>
    <!-- right bronchial tree -->
    <path d="M0 24 L24 44 L44 60 M24 44 L32 58 M44 60 L56 72 M44 60 L42 76" stroke-dasharray="180 180" stroke-dashoffset="180"/>
    <!-- finer branches -->
    <path d="M-56 72 L-62 80 M-56 72 L-58 84 M-42 76 L-48 88 M56 72 L62 80 M56 72 L58 84 M42 76 L48 88" stroke-dasharray="80 80" stroke-dashoffset="80" opacity="0.7"/>
  </g>
  <!-- alveoli clusters -->
  <g fill="currentColor" stroke="none" opacity="0.55">
    <circle cx="138" cy="172" r="2"/>
    <circle cx="132" cy="180" r="1.6"/>
    <circle cx="142" cy="186" r="1.8"/>
    <circle cx="262" cy="172" r="2"/>
    <circle cx="268" cy="180" r="1.6"/>
    <circle cx="258" cy="186" r="1.8"/>
  </g>
  <!-- vesalius-style frame ticks corner -->
  <g class="draw-paths" opacity="0.5" stroke-dasharray="60 60" stroke-dashoffset="60">
    <path d="M40 40 L52 40 L52 52"/>
    <path d="M360 40 L348 40 L348 52"/>
    <path d="M40 260 L52 260 L52 248"/>
    <path d="M360 260 L348 260 L348 248"/>
  </g>
</svg>
