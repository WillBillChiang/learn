<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- doric column (center-left) -->
  <g class="draw-paths" opacity="0.9">
    <!-- capital -->
    <rect x="150" y="78" width="60" height="12" stroke-dasharray="160 160" stroke-dashoffset="160"/>
    <rect x="154" y="70" width="52" height="8" stroke-dasharray="120 120" stroke-dashoffset="120"/>
    <!-- shaft -->
    <line x1="158" y1="90" x2="158" y2="240" stroke-dasharray="160 160" stroke-dashoffset="160"/>
    <line x1="168" y1="90" x2="168" y2="240" stroke-dasharray="160 160" stroke-dashoffset="160" opacity="0.6"/>
    <line x1="178" y1="90" x2="178" y2="240" stroke-dasharray="160 160" stroke-dashoffset="160" opacity="0.6"/>
    <line x1="188" y1="90" x2="188" y2="240" stroke-dasharray="160 160" stroke-dashoffset="160" opacity="0.6"/>
    <line x1="198" y1="90" x2="198" y2="240" stroke-dasharray="160 160" stroke-dashoffset="160" opacity="0.6"/>
    <line x1="202" y1="90" x2="202" y2="240" stroke-dasharray="160 160" stroke-dashoffset="160"/>
    <!-- base -->
    <rect x="150" y="240" width="60" height="14" stroke-dasharray="160 160" stroke-dashoffset="160"/>
    <rect x="144" y="254" width="72" height="10" stroke-dasharray="180 180" stroke-dashoffset="180"/>
  </g>
  <!-- hourglass on right -->
  <g class="draw-paths" transform="translate(264 80)" opacity="0.9" stroke-dasharray="260 260" stroke-dashoffset="260">
    <line x1="0" y1="0" x2="60" y2="0" stroke-width="1.4"/>
    <path d="M4 0 L56 0 L34 50 L56 100 L4 100 L26 50 Z"/>
    <line x1="0" y1="100" x2="60" y2="100" stroke-width="1.4"/>
    <!-- sand top -->
    <path d="M14 8 L46 8 L34 32 L26 32 Z" fill="currentColor" stroke="none" opacity="0.55"/>
    <!-- sand bottom -->
    <path d="M16 92 L44 92 L40 76 L20 76 Z" fill="currentColor" stroke="none" opacity="0.65"/>
    <!-- falling grain -->
    <line x1="30" y1="48" x2="30" y2="68" stroke-dasharray="2 3"/>
  </g>
  <!-- scroll lower left -->
  <g class="draw-paths" transform="translate(40 232)" opacity="0.8" stroke-dasharray="220 220" stroke-dashoffset="220">
    <ellipse cx="8" cy="22" rx="6" ry="22"/>
    <ellipse cx="78" cy="22" rx="6" ry="22"/>
    <line x1="8" y1="0" x2="78" y2="0"/>
    <line x1="8" y1="44" x2="78" y2="44"/>
    <line x1="22" y1="14" x2="66" y2="14" opacity="0.7"/>
    <line x1="22" y1="22" x2="62" y2="22" opacity="0.7"/>
    <line x1="22" y1="30" x2="64" y2="30" opacity="0.7"/>
  </g>
  <!-- small sun upper left -->
  <g class="draw-paths" opacity="0.7" stroke-dasharray="120 120" stroke-dashoffset="120">
    <circle cx="60" cy="60" r="10"/>
    <line x1="60" y1="42" x2="60" y2="48"/>
    <line x1="60" y1="72" x2="60" y2="78"/>
    <line x1="42" y1="60" x2="48" y2="60"/>
    <line x1="72" y1="60" x2="78" y2="60"/>
  </g>
</svg>
