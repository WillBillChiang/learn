<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- dress on a hanger (center) -->
  <g class="draw-paths" opacity="0.9" stroke-dasharray="520 520" stroke-dashoffset="520">
    <!-- hanger hook + bar -->
    <path d="M196 44 q0 -12 8 -12 q8 0 8 8" stroke-width="1.3"/>
    <path d="M204 44 L150 84 L258 84 Z" stroke-width="1.3"/>
    <!-- bodice + A-line skirt -->
    <path d="M168 84 Q176 120 172 150 L160 226 Q204 244 248 226 L236 150 Q232 120 240 84" stroke-width="1.4"/>
    <!-- waist seam -->
    <path d="M172 150 Q204 162 236 150"/>
    <!-- neckline -->
    <path d="M186 88 Q204 102 222 88"/>
  </g>
  <!-- scissors, lower-left -->
  <g class="draw-paths" opacity="0.8" stroke-dasharray="300 300" stroke-dashoffset="300" transform="translate(58 196) rotate(-18)">
    <circle cx="8" cy="40" r="9"/>
    <circle cx="30" cy="40" r="9"/>
    <path d="M14 33 L70 -4"/>
    <path d="M24 33 L70 8"/>
  </g>
  <!-- spool of thread, lower-right -->
  <g class="draw-paths" opacity="0.8" stroke-dasharray="260 260" stroke-dashoffset="260">
    <rect x="300" y="206" width="44" height="30" rx="3"/>
    <line x1="300" y1="214" x2="344" y2="214"/>
    <line x1="300" y1="228" x2="344" y2="228"/>
    <!-- thread trailing up to a needle -->
    <path d="M322 206 Q336 168 318 150 Q300 132 318 112" opacity="0.7" stroke-dasharray="160 160" stroke-dashoffset="160"/>
  </g>
  <!-- needle, upper-right -->
  <g class="draw-paths" opacity="0.85" stroke-dasharray="80 80" stroke-dashoffset="80">
    <line x1="318" y1="112" x2="338" y2="80" stroke-width="1.4"/>
    <ellipse cx="318" cy="112" rx="3.5" ry="2" transform="rotate(-58 318 112)"/>
  </g>
  <!-- buttons, upper-left -->
  <g class="draw-paths" opacity="0.75" stroke-dasharray="90 90" stroke-dashoffset="90">
    <circle cx="74" cy="74" r="12"/>
    <circle cx="74" cy="74" r="2.2" fill="currentColor" stroke="none"/>
    <circle cx="66" cy="70" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="82" cy="70" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="66" cy="78" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="82" cy="78" r="1.6" fill="currentColor" stroke="none"/>
  </g>
  <!-- a few stitch dashes drifting -->
  <g class="draw-paths" opacity="0.55" stroke-dasharray="60 60" stroke-dashoffset="60">
    <path d="M104 246 l10 -4 M120 240 l10 -4 M136 234 l10 -4" stroke-dasharray="6 6"/>
  </g>
  <!-- small star -->
  <g opacity="0.6">
    <path d="M280 56 L282 62 L288 64 L282 66 L280 72 L278 66 L272 64 L278 62 Z" fill="currentColor" stroke="none"/>
  </g>
</svg>
