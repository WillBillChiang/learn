<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- central tendril -->
  <g class="draw-paths" opacity="0.95">
    <path d="M200 290 Q200 230 180 180 Q160 130 200 80" stroke-dasharray="320 320" stroke-dashoffset="320"/>
    <!-- coiled tip -->
    <path d="M200 80 Q208 70 210 80 Q212 90 200 92 Q186 92 184 76 Q182 60 200 56 Q220 56 224 78" stroke-dasharray="160 160" stroke-dashoffset="160"/>
  </g>
  <!-- leaves on the stem -->
  <g class="draw-paths" opacity="0.85">
    <path d="M198 240 Q150 230 130 200 Q160 198 200 220 Z" stroke-dasharray="200 200" stroke-dashoffset="200"/>
    <line x1="198" y1="240" x2="145" y2="216" stroke-dasharray="60 60" stroke-dashoffset="60" opacity="0.6"/>
    <path d="M195 200 Q240 188 270 160 Q240 162 200 184 Z" stroke-dasharray="200 200" stroke-dashoffset="200"/>
    <line x1="195" y1="200" x2="245" y2="178" stroke-dasharray="60 60" stroke-dashoffset="60" opacity="0.6"/>
    <path d="M185 150 Q140 140 116 116 Q150 116 192 134 Z" stroke-dasharray="180 180" stroke-dashoffset="180"/>
  </g>
  <!-- mushroom on lower left -->
  <g class="draw-paths" transform="translate(58 210)" opacity="0.9" stroke-dasharray="240 240" stroke-dashoffset="240">
    <path d="M0 30 Q0 8 22 4 Q44 4 44 30 Q22 36 0 30 Z"/>
    <path d="M14 30 L14 60 Q22 64 30 60 L30 30"/>
    <!-- gills -->
    <line x1="14" y1="30" x2="14" y2="34" opacity="0.5"/>
    <line x1="22" y1="32" x2="22" y2="36" opacity="0.5"/>
    <line x1="30" y1="30" x2="30" y2="34" opacity="0.5"/>
    <!-- spots on cap -->
    <circle cx="12" cy="14" r="2" fill="currentColor" stroke="none" opacity="0.5"/>
    <circle cx="30" cy="12" r="2.5" fill="currentColor" stroke="none" opacity="0.5"/>
  </g>
  <!-- small fern frond upper right -->
  <g class="draw-paths" transform="translate(280 50)" opacity="0.75" stroke-dasharray="200 200" stroke-dashoffset="200">
    <path d="M0 80 Q20 40 60 0"/>
    <path d="M10 64 Q22 58 28 50" opacity="0.7"/>
    <path d="M20 52 Q32 46 38 38" opacity="0.7"/>
    <path d="M30 40 Q40 34 46 26" opacity="0.7"/>
    <path d="M40 28 Q48 22 54 16" opacity="0.7"/>
  </g>
</svg>
