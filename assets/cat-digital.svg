<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- globe with meridians -->
  <g class="draw-paths" opacity="0.9">
    <!-- outer sphere -->
    <circle cx="200" cy="150" r="92" stroke-dasharray="580 580" stroke-dashoffset="580" stroke-width="1.4"/>
    <!-- equator -->
    <ellipse cx="200" cy="150" rx="92" ry="22" stroke-dasharray="380 380" stroke-dashoffset="380" opacity="0.7"/>
    <!-- meridians -->
    <ellipse cx="200" cy="150" rx="30" ry="92" stroke-dasharray="380 380" stroke-dashoffset="380" opacity="0.7"/>
    <ellipse cx="200" cy="150" rx="60" ry="92" stroke-dasharray="500 500" stroke-dashoffset="500" opacity="0.55"/>
    <!-- tropics -->
    <ellipse cx="200" cy="150" rx="88" ry="14" transform="translate(0 -38)" stroke-dasharray="320 320" stroke-dashoffset="320" opacity="0.45"/>
    <ellipse cx="200" cy="150" rx="88" ry="14" transform="translate(0 38)" stroke-dasharray="320 320" stroke-dashoffset="320" opacity="0.45"/>
  </g>
  <!-- orbiting packets (small squares on dashed arcs) -->
  <g class="draw-paths" opacity="0.85">
    <ellipse cx="200" cy="150" rx="130" ry="48" transform="rotate(-18 200 150)" stroke-dasharray="640 640" stroke-dashoffset="640" stroke-width="1"/>
  </g>
  <!-- packet squares on the orbit -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.9">
    <rect x="60" y="120" width="8" height="8" transform="rotate(-18 64 124)" fill="none"/>
    <rect x="334" y="172" width="8" height="8" transform="rotate(-18 338 176)" fill="none"/>
    <rect x="252" y="92" width="6" height="6" transform="rotate(-18 255 95)" fill="none" opacity="0.7"/>
  </g>
  <!-- network graph in lower-left corner (nodes & edges) -->
  <g class="draw-paths" opacity="0.75">
    <path d="M44 256 L74 244 L90 268 L74 244 L100 232 L100 232 L120 252 L100 232 L130 226" stroke-dasharray="220 220" stroke-dashoffset="220"/>
    <path d="M90 268 L120 252" stroke-dasharray="40 40" stroke-dashoffset="40" opacity="0.6"/>
  </g>
  <g fill="currentColor" stroke="none" opacity="0.85">
    <circle cx="44" cy="256" r="2.6"/>
    <circle cx="74" cy="244" r="2.6"/>
    <circle cx="90" cy="268" r="2.6"/>
    <circle cx="100" cy="232" r="2.6"/>
    <circle cx="120" cy="252" r="2.6"/>
    <circle cx="130" cy="226" r="2.6"/>
  </g>
  <!-- upper-right corner: small bit-stream -->
  <g fill="currentColor" stroke="none" opacity="0.55" font-family="monospace">
    <circle cx="340" cy="44" r="1.4"/>
    <circle cx="348" cy="44" r="1.4"/>
    <circle cx="356" cy="44" r="1.4"/>
    <circle cx="364" cy="44" r="1.4"/>
    <circle cx="340" cy="52" r="1.4"/>
    <circle cx="356" cy="52" r="1.4"/>
    <circle cx="340" cy="60" r="1.4"/>
    <circle cx="348" cy="60" r="1.4"/>
    <circle cx="364" cy="60" r="1.4"/>
  </g>
  <!-- signal arcs from globe to network -->
  <g class="draw-paths" opacity="0.5">
    <path d="M130 222 Q150 200 154 178" stroke-dasharray="80 80" stroke-dashoffset="80"/>
  </g>
</svg>
