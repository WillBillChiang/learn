<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- house outline (cross-section) -->
  <g class="draw-paths" opacity="0.9">
    <!-- gable + walls -->
    <path d="M70 150 L200 60 L330 150 L330 260 L70 260 Z" stroke-dasharray="700 700" stroke-dashoffset="700" stroke-width="1.4"/>
    <!-- floor divider -->
    <path d="M70 200 L330 200" stroke-dasharray="260 260" stroke-dashoffset="260" opacity="0.6"/>
    <!-- attic line -->
    <path d="M120 150 L280 150" stroke-dasharray="160 160" stroke-dashoffset="160" opacity="0.5"/>
    <!-- door -->
    <path d="M180 260 L180 224 L220 224 L220 260" stroke-dasharray="120 120" stroke-dashoffset="120"/>
    <circle cx="214" cy="244" r="1.4" fill="currentColor" stroke="none"/>
    <!-- chimney -->
    <path d="M260 96 L260 70 L280 70 L280 110" stroke-dasharray="80 80" stroke-dashoffset="80"/>
  </g>
  <!-- water pipes traced through walls (sinuous blue-ish line) -->
  <g class="draw-paths" opacity="0.8">
    <path d="M90 260 L90 210 L110 210 L110 170 L140 170" stroke-dasharray="200 200" stroke-dashoffset="200" stroke-width="1.6"/>
    <!-- pipe joints -->
    <circle cx="90" cy="210" r="2.4" stroke-dasharray="16 16" stroke-dashoffset="16"/>
    <circle cx="110" cy="210" r="2.4" stroke-dasharray="16 16" stroke-dashoffset="16"/>
    <circle cx="110" cy="170" r="2.4" stroke-dasharray="16 16" stroke-dashoffset="16"/>
    <!-- faucet -->
    <path d="M140 170 L148 170 L148 178" stroke-dasharray="20 20" stroke-dashoffset="20"/>
    <!-- drip -->
    <path d="M148 184 Q146 188 148 192 Q150 188 148 184 Z" fill="currentColor" stroke="none" opacity="0.6"/>
  </g>
  <!-- circuit line traced through walls (geometric path with nodes) -->
  <g class="draw-paths" opacity="0.85">
    <path d="M310 260 L310 230 L290 230 L290 190 L260 190 L260 160 L240 160" stroke-dasharray="240 240" stroke-dashoffset="240"/>
    <!-- circuit nodes -->
    <circle cx="310" cy="230" r="2.6" fill="currentColor" stroke="none"/>
    <circle cx="290" cy="190" r="2.6" fill="currentColor" stroke="none"/>
    <circle cx="260" cy="160" r="2.6" fill="currentColor" stroke="none"/>
    <!-- outlet box -->
    <path d="M240 154 L240 166 L228 166 L228 154 Z" stroke-dasharray="50 50" stroke-dashoffset="50"/>
    <circle cx="232" cy="158" r="0.9" fill="currentColor" stroke="none"/>
    <circle cx="236" cy="158" r="0.9" fill="currentColor" stroke="none"/>
    <circle cx="234" cy="162" r="0.9" fill="currentColor" stroke="none"/>
  </g>
  <!-- ground line + tufts -->
  <g class="draw-paths" opacity="0.55">
    <path d="M20 274 L380 274" stroke-dasharray="360 360" stroke-dashoffset="360"/>
    <path d="M50 274 L52 268 L54 274" stroke-dasharray="14 14" stroke-dashoffset="14"/>
    <path d="M356 274 L358 268 L360 274" stroke-dasharray="14 14" stroke-dashoffset="14"/>
  </g>
  <!-- small smoke from chimney -->
  <g class="draw-paths" opacity="0.6" stroke-dasharray="80 80" stroke-dashoffset="80">
    <path d="M270 60 Q278 50 270 40 Q262 30 270 20"/>
  </g>
</svg>
