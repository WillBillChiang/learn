<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" aria-hidden="true">
  <defs>
    <radialGradient id="orrerySun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="currentColor" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Concentric armillary rings -->
  <g opacity="0.55">
    <circle cx="300" cy="300" r="280"/>
    <circle cx="300" cy="300" r="240"/>
    <circle cx="300" cy="300" r="195"/>
    <circle cx="300" cy="300" r="150"/>
    <circle cx="300" cy="300" r="108"/>
    <circle cx="300" cy="300" r="68"/>
  </g>

  <!-- Ecliptic (tilted ellipse) -->
  <g opacity="0.45">
    <ellipse cx="300" cy="300" rx="280" ry="92" transform="rotate(-18 300 300)"/>
    <ellipse cx="300" cy="300" rx="240" ry="78" transform="rotate(-18 300 300)"/>
  </g>

  <!-- Cross axes -->
  <g opacity="0.35" stroke-width="0.7">
    <line x1="20"  y1="300" x2="580" y2="300"/>
    <line x1="300" y1="20"  x2="300" y2="580"/>
    <line x1="98"  y1="98"  x2="502" y2="502"/>
    <line x1="98"  y1="502" x2="502" y2="98"/>
  </g>

  <!-- Tick marks on outer ring (every 10°) -->
  <g opacity="0.7" stroke-width="0.7">
    <g id="tickGroup">
      <line x1="300" y1="20" x2="300" y2="34"/>
    </g>
    <use href="#tickGroup" transform="rotate(10 300 300)"/>
    <use href="#tickGroup" transform="rotate(20 300 300)"/>
    <use href="#tickGroup" transform="rotate(30 300 300)"/>
    <use href="#tickGroup" transform="rotate(40 300 300)"/>
    <use href="#tickGroup" transform="rotate(50 300 300)"/>
    <use href="#tickGroup" transform="rotate(60 300 300)"/>
    <use href="#tickGroup" transform="rotate(70 300 300)"/>
    <use href="#tickGroup" transform="rotate(80 300 300)"/>
    <use href="#tickGroup" transform="rotate(90 300 300)"/>
    <use href="#tickGroup" transform="rotate(100 300 300)"/>
    <use href="#tickGroup" transform="rotate(110 300 300)"/>
    <use href="#tickGroup" transform="rotate(120 300 300)"/>
    <use href="#tickGroup" transform="rotate(130 300 300)"/>
    <use href="#tickGroup" transform="rotate(140 300 300)"/>
    <use href="#tickGroup" transform="rotate(150 300 300)"/>
    <use href="#tickGroup" transform="rotate(160 300 300)"/>
    <use href="#tickGroup" transform="rotate(170 300 300)"/>
    <use href="#tickGroup" transform="rotate(180 300 300)"/>
    <use href="#tickGroup" transform="rotate(190 300 300)"/>
    <use href="#tickGroup" transform="rotate(200 300 300)"/>
    <use href="#tickGroup" transform="rotate(210 300 300)"/>
    <use href="#tickGroup" transform="rotate(220 300 300)"/>
    <use href="#tickGroup" transform="rotate(230 300 300)"/>
    <use href="#tickGroup" transform="rotate(240 300 300)"/>
    <use href="#tickGroup" transform="rotate(250 300 300)"/>
    <use href="#tickGroup" transform="rotate(260 300 300)"/>
    <use href="#tickGroup" transform="rotate(270 300 300)"/>
    <use href="#tickGroup" transform="rotate(280 300 300)"/>
    <use href="#tickGroup" transform="rotate(290 300 300)"/>
    <use href="#tickGroup" transform="rotate(300 300 300)"/>
    <use href="#tickGroup" transform="rotate(310 300 300)"/>
    <use href="#tickGroup" transform="rotate(320 300 300)"/>
    <use href="#tickGroup" transform="rotate(330 300 300)"/>
    <use href="#tickGroup" transform="rotate(340 300 300)"/>
    <use href="#tickGroup" transform="rotate(350 300 300)"/>
  </g>

  <!-- Cardinal markers -->
  <g opacity="0.7">
    <circle cx="300" cy="20"  r="2.4" fill="currentColor" stroke="none"/>
    <circle cx="580" cy="300" r="2.4" fill="currentColor" stroke="none"/>
    <circle cx="300" cy="580" r="2.4" fill="currentColor" stroke="none"/>
    <circle cx="20"  cy="300" r="2.4" fill="currentColor" stroke="none"/>
  </g>

  <!-- Central sun aura -->
  <circle cx="300" cy="300" r="46" fill="url(#orrerySun)" stroke="none"/>
  <circle cx="300" cy="300" r="9" fill="currentColor" stroke="none" opacity="0.95"/>

  <!-- Planets on rings -->
  <circle cx="408" cy="300" r="3.5" fill="currentColor" stroke="none" opacity="0.9"/>
  <circle cx="300" cy="150" r="4.5" fill="currentColor" stroke="none" opacity="0.9"/>
  <circle cx="105" cy="300" r="3"   fill="currentColor" stroke="none" opacity="0.85"/>
  <circle cx="300" cy="495" r="5"   fill="currentColor" stroke="none" opacity="0.9"/>
  <circle cx="495" cy="495" r="3"   fill="currentColor" stroke="none" opacity="0.8"/>

  <!-- Outer ornamental fleurons (4 directions) -->
  <g opacity="0.7">
    <path d="M300 6 L304 14 L300 22 L296 14 Z" fill="currentColor" stroke="none"/>
    <path d="M594 300 L586 304 L578 300 L586 296 Z" fill="currentColor" stroke="none"/>
    <path d="M300 594 L296 586 L300 578 L304 586 Z" fill="currentColor" stroke="none"/>
    <path d="M6 300 L14 296 L22 300 L14 304 Z" fill="currentColor" stroke="none"/>
  </g>
</svg>
